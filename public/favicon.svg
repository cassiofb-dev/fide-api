<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    
    <!-- Rook Violet/Indigo Gradient -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Gold/Teal Gradient for Stats Trend -->
    <linearGradient id="goldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer subtle glowing border -->
  <rect x="8" y="8" width="496" height="496" rx="120" stroke="url(#neonGrad)" stroke-width="4" stroke-opacity="0.25" />

  <!-- Grid lines representing data/charts -->
  <path d="M 96 128 L 416 128 M 96 224 L 416 224 M 96 320 L 416 320 M 96 416 L 416 416" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.2" />
  <path d="M 128 96 L 128 416 M 224 96 L 224 416 M 320 96 L 320 416 M 416 96 L 416 416" stroke="#475569" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.2" />

  <!-- Ascending Rating Chart Lines (underneath the rook) -->
  <path d="M 96 390 C 180 370 240 280 300 210 C 340 160 380 120 416 115" stroke="url(#goldGrad)" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#glow)" />
  <circle cx="416" cy="115" r="14" fill="#06b6d4" filter="url(#glow)" />
  <circle cx="300" cy="210" r="10" fill="#10b981" />
  <circle cx="196" cy="320" r="8" fill="#eab308" />

  <!-- Stylized Chess Rook -->
  <!-- Base -->
  <path d="M 180 400 L 332 400 L 332 370 L 180 370 Z" fill="url(#neonGrad)" filter="url(#glow)" />
  <!-- Pedestal -->
  <path d="M 196 370 L 316 370 L 306 340 L 206 340 Z" fill="url(#neonGrad)" opacity="0.9" />
  <!-- Shaft -->
  <path d="M 216 340 L 296 340 L 286 220 L 226 220 Z" fill="url(#neonGrad)" />
  <!-- Collar -->
  <path d="M 206 220 L 306 220 L 316 195 L 196 195 Z" fill="url(#neonGrad)" opacity="0.9" />
  <!-- Battlements -->
  <path d="M 196 195 L 316 195 L 316 150 L 290 150 L 290 170 L 270 170 L 270 150 L 242 150 L 242 170 L 222 170 L 222 150 L 196 150 Z" fill="url(#neonGrad)" />
  
  <!-- Vertical highlight line on the Rook shaft -->
  <path d="M 256 200 L 256 340" stroke="#ffffff" stroke-width="4" opacity="0.3" stroke-linecap="round" />
</svg>
